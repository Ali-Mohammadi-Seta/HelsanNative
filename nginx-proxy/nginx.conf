events {}

http {
  # The consultation/helsan web apps run inside the native WebView and send every
  # request with credentials (axios `withCredentials = true`). Per the CORS spec a
  # browser REJECTS any response that uses `Access-Control-Allow-Origin: *` together
  # with credentials — which is exactly what bounced the consultation app back to
  # SSO in a loop. Echo the caller's Origin instead. Native (Expo) requests carry no
  # Origin header, so they fall back to "*", which is harmless because React Native
  # does not enforce CORS.
  map $http_origin $cors_origin {
    default $http_origin;
    ""      "*";
  }

  # HTTP proxy for React Native / Expo.
  # docker-compose maps host 8080 -> container 8080, and app.json points to:
  # http://<host-lan-ip>:8080/api
  server {
    listen 8080;
    server_name _;

    # Increase timeouts
    proxy_connect_timeout 600s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;

    # API proxy
    location /api {
      proxy_pass https://inhso.ir;
      proxy_ssl_verify off;
      proxy_ssl_server_name on;

      proxy_set_header Host inhso.ir;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-App-Client phone;

      # Strip any CORS headers the upstream may already set, otherwise the browser
      # sees duplicate Access-Control-Allow-Origin headers and rejects the response.
      proxy_hide_header 'Access-Control-Allow-Origin';
      proxy_hide_header 'Access-Control-Allow-Credentials';
      proxy_hide_header 'Access-Control-Allow-Methods';
      proxy_hide_header 'Access-Control-Allow-Headers';

      # CORS headers (credential-safe: echo the Origin, never "*" alongside credentials)
      add_header 'Access-Control-Allow-Origin' $cors_origin always;
      add_header 'Access-Control-Allow-Credentials' 'true' always;
      add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
      add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-App-Client, Cookie' always;

      # Handle preflight (must also echo the Origin and allow credentials)
      if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-App-Client, Cookie' always;
        add_header 'Access-Control-Max-Age' 1728000;
        add_header 'Content-Type' 'text/plain; charset=UTF-8';
        add_header 'Content-Length' 0;
        return 204;
      }
    }

    # Health check
    location /health {
      return 200 "Mobile API Proxy OK\n";
      add_header Content-Type text/plain;
    }
  }
}
